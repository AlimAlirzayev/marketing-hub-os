<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Marketing OS</title>
<style>
/* ── design tokens (shared with the panel) ─────────────────────── */
:root{
  --bg0:#090c11; --bg1:#0f141c; --bg2:#141b25; --bg3:#1a2330;
  --line:rgba(148,163,184,.13); --line2:rgba(148,163,184,.22);
  --ink:#eef3f8; --ink2:#9db0c3; --mut:#6b7f94;
  --acc:#38bdf8; --acc2:#818cf8;
  --ok:#34d399; --bad:#f87171; --warn:#fbbf24;
}
*{box-sizing:border-box;margin:0}
body{height:100vh;overflow:hidden;font:14px/1.5 system-ui,-apple-system,"Segoe UI",sans-serif;
  background:var(--bg0);color:var(--ink)}
button{font:inherit;cursor:pointer;border:0;background:none;color:inherit}
button:focus-visible{outline:2px solid var(--acc);outline-offset:2px}
.app{display:flex;height:100vh}

/* ── sidebar ───────────────────────────────────────────────────── */
aside{width:292px;flex:none;display:flex;flex-direction:column;
  background:linear-gradient(180deg,rgba(56,189,248,.04),transparent 30%),var(--bg1);
  border-right:1px solid var(--line)}
.brand{display:flex;align-items:center;gap:11px;padding:17px 18px;border-bottom:1px solid var(--line)}
.brand .mark{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;flex:none;
  background:linear-gradient(135deg,var(--acc),var(--acc2));color:#04121c;font-weight:800;font-size:17px;
  box-shadow:0 2px 12px rgba(56,189,248,.35)}
.brand .nm{font-weight:700;line-height:1.25}
.brand .sub{font-size:11px;color:var(--mut)}
nav{flex:1;overflow-y:auto;padding:14px 12px;scrollbar-width:thin;scrollbar-color:var(--bg3) transparent}
.cat{padding:0 10px;margin:16px 0 6px;font-size:10px;font-weight:700;letter-spacing:1.4px;
  text-transform:uppercase;color:var(--mut)}
.cat:first-child{margin-top:0}
.nav-item{width:100%;text-align:left;display:flex;align-items:center;gap:11px;
  padding:9px 10px;border-radius:11px;transition:background .13s;border:1px solid transparent}
.nav-item:hover{background:rgba(148,163,184,.07)}
.nav-item.active{background:rgba(56,189,248,.12);border-color:rgba(56,189,248,.35)}
.nav-item.active .n{color:#bae6fd}
.nav-item .ic{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;font-size:15px;flex:none;
  background:var(--bg2);border:1px solid var(--line)}
.nav-item .tx{min-width:0;flex:1}
.nav-item .n{display:block;font-size:13px;font-weight:600;line-height:1.3;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav-item .d{display:block;font-size:11px;color:var(--mut);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dot{width:7px;height:7px;border-radius:50%;background:var(--mut);flex:none;transition:background .3s}
.dot.up{background:var(--ok);box-shadow:0 0 6px rgba(52,211,153,.6)}
.dot.down{background:var(--bad)}
.foot{padding:11px 18px;border-top:1px solid var(--line);display:flex;align-items:center;
  justify-content:space-between;font-size:11px;color:var(--mut)}
.foot button:hover{color:var(--ink)}

/* ── main stage ────────────────────────────────────────────────── */
main{flex:1;display:flex;flex-direction:column;min-width:0}
.topbar{height:56px;flex:none;display:flex;align-items:center;gap:12px;padding:0 18px;
  background:rgba(9,12,17,.85);border-bottom:1px solid var(--line)}
.topbar .cic{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;font-size:17px;
  background:var(--bg2);border:1px solid var(--line)}
.topbar .nm{font-weight:650;line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar .d{font-size:11.5px;color:var(--mut);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.st-live{font-size:12px;white-space:nowrap}
.st-live.up{color:var(--ok)} .st-live.down{color:var(--bad)} .st-live.wait{color:var(--mut)}
.openbtn{font-size:13px;font-weight:600;background:var(--bg2);border:1px solid var(--line);
  border-radius:10px;padding:7px 13px;color:var(--ink);text-decoration:none;white-space:nowrap;
  transition:border-color .13s,background .13s}
.openbtn:hover{border-color:var(--line2);background:var(--bg3)}
.stage{flex:1;position:relative;background:#0a0e14}
.stage iframe{width:100%;height:100%;border:0;background:#fff}
.center{position:absolute;inset:0;display:grid;place-items:center;text-align:center;padding:24px}
.center .big{font-size:46px;margin-bottom:12px}
.center .t{font-weight:650;margin-bottom:5px}
.center .s{font-size:13px;color:var(--mut);max-width:420px}

/* ── health view ───────────────────────────────────────────────── */
#health{position:absolute;inset:0;overflow:auto;padding:26px;background:var(--bg0);display:none}
.hwrap{max-width:780px}
.hcard{background:var(--bg1);border:1px solid var(--line);border-radius:16px;padding:16px;margin-top:14px}
.hrow{display:flex;align-items:center;gap:12px;padding:8px 2px;border-bottom:1px solid var(--line);font-size:13px}
.hrow:last-child{border-bottom:0}
.hrow .port{font-family:ui-monospace,Consolas,monospace;font-size:11.5px;color:var(--mut);width:46px}
.hrow .key{font-weight:600;width:110px}
.hrow .nm2{color:var(--ink2);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pill{border-radius:999px;padding:4px 13px;font-size:12.5px;font-weight:650}
.pill.ok{background:rgba(52,211,153,.13);color:var(--ok)}
.pill.err{background:rgba(248,113,113,.13);color:var(--bad)}
.warnbox{margin-top:13px;border:1px solid rgba(248,113,113,.3);border-left:3px solid var(--bad);
  background:rgba(248,113,113,.05);border-radius:12px;padding:13px 15px;font-size:13px;color:#fca5a5}
.warnbox.amber{border-color:rgba(251,191,36,.3);border-left-color:var(--warn);
  background:rgba(251,191,36,.05);color:#fcd34d}
.monrow{font-size:12px;color:var(--ink2);margin-top:12px;padding:8px 12px;border-radius:9px;
  background:var(--bg2);border:1px solid var(--line)}
.ghostbtn{margin-top:16px;font-size:13px;font-weight:600;background:var(--bg2);
  border:1px solid var(--line);border-radius:10px;padding:8px 14px;color:var(--ink)}
.ghostbtn:hover{border-color:var(--line2)}
</style>
</head>
<body>
<div class="app">

  <aside>
    <div class="brand">
      <div class="mark" id="b-mark">M</div>
      <div class="tx">
        <div class="nm" id="b-name">Marketing OS</div>
        <div class="sub" id="b-sub">komanda paneli</div>
      </div>
    </div>
    <nav id="nav"></nav>
    <div class="foot">
      <span>Bütün xidmətlər lokal</span>
      <button id="refresh" title="Statusu yenilə">↻ status</button>
    </div>
  </aside>

  <main>
    <div class="topbar">
      <div class="cic" id="cur-icon">📊</div>
      <div style="min-width:0">
        <div class="nm" id="cur-name">—</div>
        <div class="d" id="cur-desc"></div>
      </div>
      <div style="flex:1"></div>
      <span class="st-live wait" id="cur-status">yoxlanılır…</span>
      <a id="cur-open" href="#" target="_blank" class="openbtn">Yeni pəncərədə ↗</a>
    </div>
    <div class="stage">
      <div id="offline" class="center" style="display:none">
        <div>
          <div class="big">😴</div>
          <div class="t">Bu xidmət hazırda işləmir</div>
          <div class="s">START_MARKETING_OS faylını işə sal — bütün xidmətlər birlikdə qalxır.</div>
        </div>
      </div>
      <iframe id="frame" src="about:blank"></iframe>
      <div id="health"></div>
    </div>
  </main>
</div>

<script>
const $ = id => document.getElementById(id);
let SERVICES = [], statusMap = {}, current = null;

async function init(){
  loadBrand();
  SERVICES = await (await fetch('/api/services')).json();
  renderNav();
  await refreshStatus();
  if(SERVICES.length) select(SERVICES[0]);
  setInterval(refreshStatus, 10000);
}

async function loadBrand(){
  try{
    const b = await (await fetch('/api/brand')).json();
    const sys = b.system_name || 'Marketing OS';
    $('b-name').textContent = sys;
    $('b-sub').textContent = (b.name ? b.name + ' · ' : '') + 'komanda paneli';
    $('b-mark').textContent = (sys[0] || 'M').toUpperCase();
    document.title = sys;
  }catch(e){}
}

function renderNav(){
  const cats = {};
  SERVICES.forEach(s => { (cats[s.cat] = cats[s.cat] || []).push(s); });
  $('nav').innerHTML = Object.entries(cats).map(([cat, items]) => `
    <div class="cat">${cat}</div>
    ${items.map(s => `
      <button data-key="${s.key}" class="nav-item">
        <span class="ic">${s.icon}</span>
        <span class="tx">
          <span class="n">${s.name}</span>
          <span class="d">${s.desc}</span>
        </span>
        <span class="dot" data-dot="${s.key}"></span>
      </button>`).join('')}`).join('');
  $('nav').insertAdjacentHTML('beforeend', `
    <div class="cat">Nəzarət</div>
    <button data-key="_health" class="nav-item">
      <span class="ic">🩺</span>
      <span class="tx">
        <span class="n">Sistem Sağlamlığı</span>
        <span class="d">Reyestr ↔ reallıq audit</span>
      </span>
    </button>`);
  $('nav').querySelectorAll('.nav-item').forEach(b =>
    b.onclick = () => {
      if (b.dataset.key === '_health') return showHealth(b);
      select(SERVICES.find(s => s.key === b.dataset.key));
    });
}

function select(s){
  current = s;
  $('health').style.display = 'none';
  $('cur-open').style.display = '';
  $('nav').querySelectorAll('.nav-item').forEach(b =>
    b.classList.toggle('active', b.dataset.key === s.key));
  $('cur-icon').textContent = s.icon;
  $('cur-name').textContent = s.name;
  $('cur-desc').textContent = s.desc;
  const url = `http://localhost:${s.port}${s.path || ''}`;
  $('cur-open').href = url;
  const up = statusMap[s.key];
  $('offline').style.display = (up === false) ? 'grid' : 'none';
  $('frame').style.visibility = (up === false) ? 'hidden' : 'visible';
  if(up !== false) $('frame').src = url;
  paintCurStatus();
}

function paintCurStatus(){
  if(!current) return;
  const up = statusMap[current.key];
  const el = $('cur-status');
  if(up === true){ el.textContent = '● işləyir'; el.className = 'st-live up'; }
  else if(up === false){ el.textContent = '● dayanıb'; el.className = 'st-live down'; }
  else { el.textContent = 'yoxlanılır…'; el.className = 'st-live wait'; }
}

async function refreshStatus(){
  try { statusMap = await (await fetch('/api/status')).json(); } catch(e){ return; }
  SERVICES.forEach(s => {
    const dot = document.querySelector(`[data-dot="${s.key}"]`);
    if(dot) dot.className = 'dot ' + (statusMap[s.key] ? 'up' : 'down');
  });
  paintCurStatus();
  if(current && statusMap[current.key] && $('frame').src === 'about:blank') select(current);
}

async function showHealth(btn){
  $('nav').querySelectorAll('.nav-item').forEach(b => b.classList.toggle('active', b === btn));
  $('cur-icon').textContent = '🩺';
  $('cur-name').textContent = 'Sistem Sağlamlığı';
  $('cur-desc').textContent = 'Reyestr ↔ reallıq (services.json audit)';
  $('cur-status').textContent = '';
  $('cur-open').style.display = 'none';
  $('frame').style.visibility = 'hidden';
  $('offline').style.display = 'none';
  const h = $('health');
  h.style.display = 'block';
  h.innerHTML = '<div style="color:var(--mut)">Yoxlanılır…</div>';

  let a;
  try { a = await (await fetch('/api/audit')).json(); }
  catch(e){ h.innerHTML = '<div style="color:var(--bad)">Audit alınmadı.</div>'; return; }

  const okBadge = a.ok
    ? '<span class="pill ok">✓ Reyestr reallıqla tam uyğundur</span>'
    : '<span class="pill err">✗ Drift var — düzəliş lazımdır</span>';

  const rows = a.services.map(s => `
    <div class="hrow">
      <span class="dot ${s.up ? 'up' : 'down'}"></span>
      <span class="port">${s.port}</span>
      <span class="key">${s.key}</span>
      <span class="nm2">${s.name}</span>
      <span style="font-size:12px;color:${s.up ? 'var(--ok)' : 'var(--bad)'}">${s.up ? 'işləyir' : 'dayanıb'}</span>
    </div>`).join('');

  const drift = a.drift.length ? `
    <div class="warnbox">
      <b>⚠ Reyestrdə olmayan portlar (boşluq!)</b><br>
      ${a.drift.map(d => `✗ ${d.port} (${d.why.join(', ')}) → services.json-a əlavə et`).join('<br>')}
    </div>` : '';

  const md = a.missing_dir.length ? `
    <div class="warnbox amber">
      <b>⚠ Reyestrdə var, qovluq yox</b><br>
      ${a.missing_dir.map(s => `✗ ${s.key} → ${s.dir}`).join('<br>')}
    </div>` : '';

  const m = a.monitor || {};
  const mon = `<div class="monrow">🔄 Avto-monitor: ${m.enabled ? 'AKTİV — hər ' + m.interval_min + ' dəq' : 'söndürülüb'}
      · son yoxlama: ${m.last_run || '—'}${m.last_alert ? ' · son Telegram: ' + m.last_alert : ''} · drift olsa Telegram</div>`;

  h.innerHTML = `
    <div class="hwrap">
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
        <h2 style="font-size:17px">Sistem Sağlamlığı</h2>${okBadge}
      </div>
      <div style="font-size:12.5px;color:var(--mut);margin-top:6px">
        Reyestr: ${a.counts.registered} · dinləyən: ${a.counts.listening} · kodda istinad: ${a.counts.referenced}
        · aralıq ${a.counts.range[0]}–${a.counts.range[1]}</div>
      ${mon}
      <div class="hcard">${rows}</div>
      ${drift}${md}
      <button class="ghostbtn" onclick="showHealth(document.querySelector('[data-key=_health]'))">↻ Yenidən yoxla</button>
    </div>`;
}

$('refresh').onclick = refreshStatus;
init();
</script>
</body>
</html>
