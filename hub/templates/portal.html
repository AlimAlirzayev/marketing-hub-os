<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Marketing OS</title>
<style>
/* ── Studio design tokens (shared language with gateway/panel.py v4) ── */
:root{
  --bg:#f4f3f0; --card:#ffffff; --card2:#f8f7f4; --thumb:#edece8;
  --ink:#1b1d23; --ink2:#4d5361; --mut:#8b8f9a;
  --line:#e5e3dd; --line2:#d3d0c8;
  --acc:#4338ca; --acc-soft:#eceefc; --acc-line:#c7cdf4;
  --ok:#087f5b; --ok-soft:#e3f5ee; --warn:#9a5b00; --warn-soft:#fdf2df;
  --bad:#c92a2a; --bad-soft:#fdecec;
  --btn:#1b1d23; --btnink:#ffffff;
  --shadow:0 1px 2px rgba(28,25,15,.04),0 10px 30px rgba(28,25,15,.06);
}
:root[data-theme="dark"]{
  --bg:#0d1117; --card:#151b24; --card2:#1a2230; --thumb:#0f141c;
  --ink:#edf2f8; --ink2:#9fb0c2; --mut:#6d8093;
  --line:rgba(148,163,184,.15); --line2:rgba(148,163,184,.3);
  --acc:#8b93f8; --acc-soft:rgba(129,140,248,.14); --acc-line:rgba(129,140,248,.4);
  --ok:#34d399; --ok-soft:rgba(52,211,153,.12); --warn:#fbbf24; --warn-soft:rgba(251,191,36,.1);
  --bad:#f87171; --bad-soft:rgba(248,113,113,.12);
  --btn:#edf2f8; --btnink:#10141b;
  --shadow:0 1px 0 rgba(255,255,255,.03) inset,0 10px 30px rgba(0,0,0,.35);
}
*{box-sizing:border-box;margin:0}
body{height:100vh;overflow:hidden;font:14.5px/1.55 system-ui,-apple-system,"Segoe UI",sans-serif;
  background:var(--bg);color:var(--ink);transition:background .2s,color .2s}
button{font:inherit;cursor:pointer;border:0;background:none;color:inherit}
button:focus-visible{outline:2px solid var(--acc);outline-offset:2px}
.app{display:flex;height:100vh}

/* ── sidebar ───────────────────────────────────────────────────── */
aside{width:296px;flex:none;display:flex;flex-direction:column;
  background:var(--card);border-right:1px solid var(--line)}
.brand{display:flex;align-items:center;gap:11px;padding:17px 18px;border-bottom:1px solid var(--line)}
.brand .mark{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;flex:none;
  background:var(--btn);color:var(--btnink);font-weight:800;font-size:17px;
  font-family:Georgia,"Times New Roman",serif}
.brand .nm{font-weight:700;line-height:1.25}
.brand .nm em{font-family:Georgia,"Times New Roman",serif;font-style:italic;font-weight:500;color:var(--acc)}
.brand .sub{font-size:11px;color:var(--mut)}
nav{flex:1;overflow-y:auto;padding:14px 12px;scrollbar-width:thin;scrollbar-color:var(--line2) transparent}
.cat{padding:0 10px;margin:16px 0 6px;font-size:10px;font-weight:700;letter-spacing:1.4px;
  text-transform:uppercase;color:var(--mut)}
.cat:first-child{margin-top:0}
.nav-item{width:100%;text-align:left;display:flex;align-items:center;gap:11px;
  padding:9px 10px;border-radius:11px;transition:background .13s;border:1px solid transparent}
.nav-item:hover{background:var(--card2)}
.nav-item.active{background:var(--acc-soft);border-color:var(--acc-line)}
.nav-item.active .n{color:var(--acc)}
.nav-item .ic{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;font-size:15px;flex:none;
  background:var(--card2);border:1px solid var(--line)}
.nav-item .tx{min-width:0;flex:1}
.nav-item .n{display:block;font-size:13px;font-weight:600;line-height:1.3;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav-item .d{display:block;font-size:11px;color:var(--mut);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dot{width:7px;height:7px;border-radius:50%;background:var(--mut);flex:none;transition:background .3s}
.dot.up{background:var(--ok)}
.dot.down{background:var(--bad)}
.dot.na{background:var(--line2)}
.wrow{width:100%;text-align:left;display:flex;align-items:center;gap:9px;padding:6px 10px;
  border-radius:9px;font-size:12.5px;color:var(--ink2);border:1px solid transparent}
.wrow:hover{background:var(--card2);color:var(--ink)}
.wrow.active{background:var(--acc-soft);border-color:var(--acc-line);color:var(--acc)}
.wrow .wn{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wrow .rt{font-size:9px;font-weight:700;letter-spacing:.5px;color:var(--warn);
  background:var(--warn-soft);border-radius:4px;padding:1px 5px}
.foot{padding:11px 14px;border-top:1px solid var(--line);display:flex;align-items:center;gap:8px;
  font-size:11.5px;color:var(--mut)}
.foot .sp{flex:1}
.ibtn{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;
  border:1px solid var(--line);background:var(--card2);color:var(--ink2)}
.ibtn:hover{color:var(--ink);border-color:var(--line2)}
.ibtn svg{width:14px;height:14px}

/* ── main stage ────────────────────────────────────────────────── */
main{flex:1;display:flex;flex-direction:column;min-width:0}
.topbar{height:58px;flex:none;display:flex;align-items:center;gap:12px;padding:0 18px;
  background:var(--card);border-bottom:1px solid var(--line)}
.topbar .cic{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;font-size:17px;
  background:var(--card2);border:1px solid var(--line)}
.topbar .nm{font-weight:650;line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar .d{font-size:11.5px;color:var(--mut);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.st-live{font-size:12px;white-space:nowrap}
.st-live.up{color:var(--ok)} .st-live.down{color:var(--bad)} .st-live.wait{color:var(--mut)}
.openbtn{font-size:13px;font-weight:600;background:var(--btn);color:var(--btnink);
  border-radius:10px;padding:8px 14px;text-decoration:none;white-space:nowrap}
.openbtn:hover{opacity:.88}
.stage{flex:1;position:relative;background:var(--bg)}
.stage iframe{width:100%;height:100%;border:0;background:#fff}
.center{position:absolute;inset:0;display:grid;place-items:center;text-align:center;padding:24px}
.center .big{font-size:44px;margin-bottom:12px}
.center .t{font-weight:650;margin-bottom:5px}
.center .s{font-size:13px;color:var(--mut);max-width:440px}

/* ── external-world info card ──────────────────────────────────── */
#ext{position:absolute;inset:0;overflow:auto;padding:26px;background:var(--bg);display:none}
.xcard{max-width:560px;background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:24px;box-shadow:var(--shadow)}
.xcard h2{font-size:19px;margin-bottom:2px}
.xcard .world{font-size:12px;color:var(--mut);text-transform:uppercase;letter-spacing:1px;font-weight:700}
.xcard .desc{margin-top:12px;color:var(--ink2)}
.xrow{display:flex;gap:10px;margin-top:14px;font-size:13px;align-items:center;flex-wrap:wrap}
.mono{font-family:ui-monospace,Consolas,monospace;font-size:12px;color:var(--ink2);
  background:var(--card2);border:1px solid var(--line);border-radius:7px;padding:3px 9px}
.pill{border-radius:999px;padding:4px 13px;font-size:12.5px;font-weight:650}
.pill.ok{background:var(--ok-soft);color:var(--ok)}
.pill.err{background:var(--bad-soft);color:var(--bad)}
.pill.na{background:var(--card2);color:var(--mut)}
.xnote{margin-top:16px;font-size:12.5px;color:var(--warn);background:var(--warn-soft);
  border:1px solid var(--warn);border-radius:10px;padding:10px 13px}
.xopen{display:inline-flex;margin-top:18px;font-size:13px;font-weight:600;background:var(--btn);
  color:var(--btnink);border-radius:10px;padding:9px 15px;text-decoration:none}

/* ── health view ───────────────────────────────────────────────── */
#health{position:absolute;inset:0;overflow:auto;padding:26px;background:var(--bg);display:none}
.hwrap{max-width:820px}
.hcard{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;
  margin-top:14px;box-shadow:var(--shadow)}
.hcard h4{font-size:11px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;
  color:var(--mut);margin:2px 2px 8px}
.hrow{display:flex;align-items:center;gap:12px;padding:8px 2px;border-bottom:1px solid var(--line);font-size:13px}
.hrow:last-child{border-bottom:0}
.hrow .port{font-family:ui-monospace,Consolas,monospace;font-size:11.5px;color:var(--mut);width:52px}
.hrow .key{font-weight:600;width:130px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hrow .nm2{color:var(--ink2);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.warnbox{margin-top:13px;border:1px solid var(--bad);border-left:3px solid var(--bad);
  background:var(--bad-soft);border-radius:12px;padding:13px 15px;font-size:13px;color:var(--bad)}
.warnbox.amber{border-color:var(--warn);border-left-color:var(--warn);
  background:var(--warn-soft);color:var(--warn)}
.monrow{font-size:12px;color:var(--ink2);margin-top:12px;padding:8px 12px;border-radius:9px;
  background:var(--card2);border:1px solid var(--line)}
.ghostbtn{margin-top:16px;font-size:13px;font-weight:600;background:var(--card);
  border:1px solid var(--line);border-radius:10px;padding:8px 14px;color:var(--ink)}
.ghostbtn:hover{border-color:var(--line2)}
</style>
</head>
<body>
<div class="app">

  <aside>
    <div class="brand">
      <div class="mark" id="b-mark">M</div>
      <div class="tx">
        <div class="nm" id="b-name">Marketing OS</div>
        <div class="sub" id="b-sub">vahid giriş qapısı</div>
      </div>
    </div>
    <nav id="nav"></nav>
    <div class="foot">
      <span id="foot-note">bütün xidmətlər lokal</span>
      <span class="sp"></span>
      <button class="ibtn" id="theme" title="Tema">
        <svg id="thIcMoon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/></svg>
        <svg id="thIcSun" style="display:none" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
      </button>
      <button class="ibtn" id="refresh" title="Statusu yenilə">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 12a9 9 0 1 0 2.6-6.3M3 3v6h6"/></svg>
      </button>
    </div>
  </aside>

  <main>
    <div class="topbar">
      <div class="cic" id="cur-icon">📊</div>
      <div style="min-width:0">
        <div class="nm" id="cur-name">—</div>
        <div class="d" id="cur-desc"></div>
      </div>
      <div style="flex:1"></div>
      <span class="st-live wait" id="cur-status">yoxlanılır…</span>
      <a id="cur-open" href="#" target="_blank" class="openbtn">Yeni pəncərədə ↗</a>
    </div>
    <div class="stage">
      <div id="offline" class="center" style="display:none">
        <div>
          <div class="big">😴</div>
          <div class="t">Bu xidmət hazırda işləmir</div>
          <div class="s">START_MARKETING_OS faylını işə sal — bütün xidmətlər birlikdə qalxır.</div>
        </div>
      </div>
      <iframe id="frame" src="about:blank"></iframe>
      <div id="ext"></div>
      <div id="health"></div>
    </div>
  </main>
</div>

<script>
const $ = id => document.getElementById(id);
let SERVICES = [], EXTERNAL = [], statusMap = {}, current = null;

/* theme — same localStorage key as the panel, so both fronts flip together */
function applyTheme(t){
  document.documentElement.dataset.theme = t;
  try{ localStorage.setItem('rs-theme', t); }catch(e){}
  $('thIcSun').style.display = t === 'dark' ? 'block' : 'none';
  $('thIcMoon').style.display = t === 'dark' ? 'none' : 'block';
  // the panel lives on another port = another localStorage origin, so the
  // theme travels by URL (?theme=), not by storage — reload it on flip
  if(current && current.key === 'panel') select(current);
}
$('theme').onclick = () =>
  applyTheme((document.documentElement.dataset.theme || 'light') === 'light' ? 'dark' : 'light');

async function init(){
  let th = 'light';
  try{ th = localStorage.getItem('rs-theme') || 'light'; }catch(e){}
  applyTheme(new URLSearchParams(location.search).get('theme') || th);
  loadBrand();
  SERVICES = await (await fetch('/api/services')).json();
  try{ EXTERNAL = await (await fetch('/api/external')).json(); }catch(e){ EXTERNAL = []; }
  renderNav();
  await refreshStatus();
  const want = new URLSearchParams(location.search).get('open');
  const first = SERVICES.find(s => s.key === want) || SERVICES[0];
  if(first) select(first);
  setInterval(refreshStatus, 10000);
  setInterval(refreshExternal, 30000);
}

async function loadBrand(){
  try{
    const b = await (await fetch('/api/brand')).json();
    const sys = b.system_name || 'Marketing OS';
    $('b-name').innerHTML = sys.replace(/ OS$/, ' <em>OS</em>');
    $('b-sub').textContent = (b.name ? b.name + ' · ' : '') + 'vahid giriş qapısı';
    $('b-mark').textContent = (sys[0] || 'M').toUpperCase();
    document.title = sys;
  }catch(e){}
}

function renderNav(){
  const cats = {};
  SERVICES.forEach(s => { (cats[s.cat] = cats[s.cat] || []).push(s); });
  let html = Object.entries(cats).map(([cat, items]) => `
    <div class="cat">${cat}</div>
    ${items.map(s => `
      <button data-key="${s.key}" class="nav-item">
        <span class="ic">${s.icon}</span>
        <span class="tx">
          <span class="n">${s.name}</span>
          <span class="d">${s.desc}</span>
        </span>
        <span class="dot" data-dot="${s.key}"></span>
      </button>`).join('')}`).join('');
  html += `
    <div class="cat">Nəzarət</div>
    <button data-key="_health" class="nav-item">
      <span class="ic">🩺</span>
      <span class="tx">
        <span class="n">Sistem Sağlamlığı</span>
        <span class="d">Reyestr ↔ reallıq audit</span>
      </span>
    </button>`;
  if(EXTERNAL.length){
    html += `<div class="cat">Digər dünyalar</div>`;
    html += EXTERNAL.map(e => `
      <button data-ext="${e.key}" class="wrow">
        <span class="dot na" data-xdot="${e.key}"></span>
        <span class="wn">${e.name}</span>
        ${e.retired ? '<span class="rt">KÖHNƏ</span>' : ''}
      </button>`).join('');
  }
  $('nav').innerHTML = html;
  $('nav').querySelectorAll('.nav-item').forEach(b =>
    b.onclick = () => {
      if (b.dataset.key === '_health') return showHealth(b);
      select(SERVICES.find(s => s.key === b.dataset.key));
    });
  $('nav').querySelectorAll('.wrow').forEach(b =>
    b.onclick = () => showExternal(EXTERNAL.find(e => e.key === b.dataset.ext), b));
  paintExternalDots();
}

function clearStage(){
  ['offline','ext','health'].forEach(id => $(id).style.display = 'none');
  $('frame').style.visibility = 'hidden';
  $('nav').querySelectorAll('.nav-item,.wrow').forEach(b => b.classList.remove('active'));
}

function select(s){
  current = s;
  clearStage();
  $('cur-open').style.display = '';
  const btn = $('nav').querySelector(`[data-key="${s.key}"]`);
  if(btn) btn.classList.add('active');
  $('cur-icon').textContent = s.icon;
  $('cur-name').textContent = s.name;
  $('cur-desc').textContent = s.desc;
  let url = `http://127.0.0.1:${s.port}${s.path || ''}`;
  if(s.key === 'panel')
    url += (url.includes('?') ? '&' : '?') + 'theme=' + (document.documentElement.dataset.theme || 'light');
  $('cur-open').href = url;
  const up = statusMap[s.key];
  $('offline').style.display = (up === false) ? 'grid' : 'none';
  $('frame').style.visibility = (up === false) ? 'hidden' : 'visible';
  if(up !== false) $('frame').src = url;
  paintCurStatus();
}

function showExternal(e, btn){
  if(!e) return;
  current = null;
  clearStage();
  btn.classList.add('active');
  $('cur-icon').textContent = '🌐';
  $('cur-name').textContent = e.name;
  $('cur-desc').textContent = e.world;
  $('cur-status').textContent = '';
  $('cur-open').style.display = 'none';
  const st = e.up === true ? '<span class="pill ok">● işləyir</span>'
           : e.up === false ? '<span class="pill err">● cavab vermir</span>'
           : '<span class="pill na">cron / portsuz</span>';
  const addr = e.port ? `<span class="mono">${e.host || '127.0.0.1'}:${e.port}</span>` : '';
  const openBtn = (e.ui && e.up)
    ? `<a class="xopen" href="http://127.0.0.1:${e.port}" target="_blank">Aç ↗${e.tunnel ? '' : ' (yalnız serverdə)'}</a>` : '';
  const retired = e.retired
    ? `<div class="xnote">⚠ Köhnə stack — 2026-05 auditində təqaüdə göndərilib. Yeni iş bura bağlanmamalıdır.</div>` : '';
  $('ext').innerHTML = `
    <div class="xcard">
      <div class="world">${e.world}</div>
      <h2>${e.name}</h2>
      <div class="desc">${e.desc}</div>
      <div class="xrow">${st}${addr}</div>
      ${retired}${openBtn}
    </div>`;
  $('ext').style.display = 'block';
}

function paintCurStatus(){
  if(!current) return;
  const up = statusMap[current.key];
  const el = $('cur-status');
  if(up === true){ el.textContent = '● işləyir'; el.className = 'st-live up'; }
  else if(up === false){ el.textContent = '● dayanıb'; el.className = 'st-live down'; }
  else { el.textContent = 'yoxlanılır…'; el.className = 'st-live wait'; }
}

function paintExternalDots(){
  EXTERNAL.forEach(e => {
    const dot = document.querySelector(`[data-xdot="${e.key}"]`);
    if(dot) dot.className = 'dot ' + (e.up === true ? 'up' : e.up === false ? 'down' : 'na');
  });
}

async function refreshStatus(){
  try { statusMap = await (await fetch('/api/status')).json(); } catch(e){ return; }
  SERVICES.forEach(s => {
    const dot = document.querySelector(`[data-dot="${s.key}"]`);
    if(dot) dot.className = 'dot ' + (statusMap[s.key] ? 'up' : 'down');
  });
  paintCurStatus();
  if(current && statusMap[current.key] && $('frame').src === 'about:blank') select(current);
}

async function refreshExternal(){
  try { EXTERNAL = await (await fetch('/api/external')).json(); } catch(e){ return; }
  paintExternalDots();
}

async function showHealth(btn){
  current = null;
  clearStage();
  btn.classList.add('active');
  $('cur-icon').textContent = '🩺';
  $('cur-name').textContent = 'Sistem Sağlamlığı';
  $('cur-desc').textContent = 'Reyestr ↔ reallıq (services.json audit)';
  $('cur-status').textContent = '';
  $('cur-open').style.display = 'none';
  const h = $('health');
  h.style.display = 'block';
  h.innerHTML = '<div style="color:var(--mut)">Yoxlanılır…</div>';

  let a;
  try { a = await (await fetch('/api/audit')).json(); }
  catch(e){ h.innerHTML = '<div style="color:var(--bad)">Audit alınmadı.</div>'; return; }
  await refreshExternal();

  const okBadge = a.ok
    ? '<span class="pill ok">✓ Reyestr reallıqla tam uyğundur</span>'
    : '<span class="pill err">✗ Drift var — düzəliş lazımdır</span>';

  const rows = a.services.map(s => `
    <div class="hrow">
      <span class="dot ${s.up ? 'up' : 'down'}"></span>
      <span class="port">${s.port}</span>
      <span class="key">${s.key}</span>
      <span class="nm2">${s.name}</span>
      <span style="font-size:12px;color:${s.up ? 'var(--ok)' : 'var(--bad)'}">${s.up ? 'işləyir' : 'dayanıb'}</span>
    </div>`).join('');

  const xrows = EXTERNAL.map(e => `
    <div class="hrow">
      <span class="dot ${e.up === true ? 'up' : e.up === false ? 'down' : 'na'}"></span>
      <span class="port">${e.port || '—'}</span>
      <span class="key">${e.key}</span>
      <span class="nm2">${e.world} — ${e.desc}</span>
      <span style="font-size:12px;color:${e.up === true ? 'var(--ok)' : e.up === false ? 'var(--bad)' : 'var(--mut)'}">
        ${e.up === true ? 'işləyir' : e.up === false ? 'cavab yoxdur' : '—'}</span>
    </div>`).join('');

  const drift = a.drift.length ? `
    <div class="warnbox">
      <b>⚠ Reyestrdə olmayan portlar (boşluq!)</b><br>
      ${a.drift.map(d => `✗ ${d.port} (${d.why.join(', ')}) → services.json-a əlavə et`).join('<br>')}
    </div>` : '';

  const md = a.missing_dir.length ? `
    <div class="warnbox amber">
      <b>⚠ Reyestrdə var, qovluq yox</b><br>
      ${a.missing_dir.map(s => `✗ ${s.key} → ${s.dir}`).join('<br>')}
    </div>` : '';

  const m = a.monitor || {};
  const mon = `<div class="monrow">🔄 Avto-monitor: ${m.enabled ? 'AKTİV — hər ' + m.interval_min + ' dəq' : 'söndürülüb'}
      · son yoxlama: ${m.last_run || '—'}${m.last_alert ? ' · son Telegram: ' + m.last_alert : ''} · drift olsa Telegram</div>`;

  h.innerHTML = `
    <div class="hwrap">
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
        <h2 style="font-size:17px">Sistem Sağlamlığı</h2>${okBadge}
      </div>
      <div style="font-size:12.5px;color:var(--mut);margin-top:6px">
        Reyestr: ${a.counts.registered} · dinləyən: ${a.counts.listening} · kodda istinad: ${a.counts.referenced}
        · aralıq ${a.counts.range[0]}–${a.counts.range[1]}</div>
      ${mon}
      <div class="hcard"><h4>Marketing OS — ${a.services.length} xidmət</h4>${rows}</div>
      <div class="hcard"><h4>Digər dünyalar — ${EXTERNAL.length} qeyd</h4>${xrows}</div>
      ${drift}${md}
      <button class="ghostbtn" onclick="showHealth(document.querySelector('[data-key=_health]'))">↻ Yenidən yoxla</button>
    </div>`;
}

$('refresh').onclick = () => { refreshStatus(); refreshExternal(); };
init();
</script>
</body>
</html>
