[pytest]
# Why this file exists (2026-07-14): a bare `pytest` at the repo root used to die
# with 27 collection errors — not because anything was broken, but because pytest's
# default "prepend" import mode drops every test file's parent dir onto sys.path.
# This repo has EIGHT modules named `config.py` (ads-studio, atelier, cx-command-
# center, ga4-studio, influencer-hunter, meta-capi, price-hunter, seo) plus a
# `meta-capi/gateway.py` that shadows the root `gateway/` package. They ate each
# other, and the whole suite looked red while every test was in fact green.
#
# Two rules fix the root suite:
#   import-mode=importlib -> pytest stops mutating sys.path per test file
#   pythonpath = .        -> the root packages (gateway, hub, brain, seo, doit) resolve
#
# testpaths keeps a bare `pytest` scoped to the root suite, which is collision-free.
# The sub-project suites CANNOT share a process with it or each other (same `config`
# module name, different code) — each needs its own interpreter. `python run_tests.py`
# does exactly that and is the only command that runs everything.
#
# Do NOT put `seo/` itself on sys.path: seo/http.py shadows the stdlib `http`
# package and urllib3 dies on import. seo is a package — import it from the root.
testpaths = tests
pythonpath = .
addopts = --import-mode=importlib
