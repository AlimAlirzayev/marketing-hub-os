<!doctype html>
<html lang="az">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Influencer Se√ßim Motoru</title>
<style>
  :root{
    --bg:#0b0d10; --panel:#15181d; --card:#1d2229; --card2:#11151a; --line:#2c333d;
    --text:#eef2f6; --muted:#909cab; --faint:#6b7682;
    --red:#e31e24; --cyan:#19a7a8; --green:#22c55e; --amber:#f59e0b; --blue:#60a5fa;
  }
  *{box-sizing:border-box}
  body{margin:0;background:radial-gradient(1200px 600px at 80% -10%,#15212b 0%,var(--bg) 55%);color:var(--text);
    font:14px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;-webkit-font-smoothing:antialiased}
  header{display:flex;gap:14px;align-items:center;padding:15px 22px;border-bottom:1px solid var(--line);
    background:rgba(15,18,22,.85);backdrop-filter:blur(8px);position:sticky;top:0;z-index:5}
  .brand{display:flex;align-items:center;gap:10px}
  .dot{width:10px;height:10px;border-radius:50%;background:var(--red);box-shadow:0 0 12px var(--red)}
  h1{font-size:17px;margin:0;letter-spacing:.2px}
  .sub{color:var(--muted);font-size:12px}
  .status{margin-left:auto;color:var(--muted);font-size:12px;border:1px solid var(--line);padding:5px 10px;border-radius:20px;display:flex;gap:8px;align-items:center}
  .status .live{width:7px;height:7px;border-radius:50%;background:var(--faint)}
  .status.on .live{background:var(--green);box-shadow:0 0 8px var(--green)}
  main{max-width:1240px;margin:0 auto;padding:22px}
  .grid{display:grid;grid-template-columns:1.02fr .98fr;gap:18px;align-items:start}
  @media(max-width:920px){.grid{grid-template-columns:1fr}header{position:static;flex-wrap:wrap}.status{margin-left:0}}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px}
  label{display:block;color:var(--muted);font-size:12px;margin:0 0 6px;font-weight:600}
  textarea,input,button{font:inherit;color:var(--text);background:var(--card);border:1px solid var(--line);border-radius:10px;padding:11px 13px;width:100%}
  textarea{min-height:120px;resize:vertical}
  textarea:focus,input:focus{outline:none;border-color:var(--cyan);box-shadow:0 0 0 3px rgba(25,167,168,.15)}
  button{width:auto;cursor:pointer;font-weight:700}
  button.primary{background:var(--red);border-color:var(--red);color:#fff;min-width:140px;transition:transform .05s,filter .15s}
  button.primary:hover:not(:disabled){filter:brightness(1.08)}
  button.primary:active:not(:disabled){transform:translateY(1px)}
  button:disabled{opacity:.55;cursor:default}
  .row{display:flex;gap:10px;align-items:end;flex-wrap:wrap;margin-top:12px}
  .row>div{flex:1;min-width:150px}
  .row .small{max-width:118px}
  .check{display:flex;gap:8px;align-items:center;color:var(--muted);font-size:13px}
  .check input{width:auto}
  .brief{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-top:14px}
  @media(max-width:700px){.brief{grid-template-columns:1fr}}
  .kv{border:1px solid var(--line);border-radius:10px;padding:9px 11px;background:var(--card2)}
  .kv b{display:block;font-size:10.5px;color:var(--faint);font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px}
  .section-title{font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin:0 0 12px;display:flex;align-items:center;gap:8px}
  .section-title::before{content:"";width:3px;height:14px;border-radius:3px;background:var(--red)}
  /* decision box */
  .decision-box h2{font-size:14px;margin:0 0 10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
  .decision-box p{margin:8px 0}
  .answer{font-size:16px;font-weight:750;line-height:1.45}
  .qline{font-size:13px;color:var(--text);font-weight:600;border-left:2px solid var(--cyan);padding-left:10px}
  .conf{display:inline-flex;gap:6px;align-items:center;font-size:12px;border:1px solid var(--line);border-radius:20px;padding:3px 10px}
  .conf b{text-transform:capitalize}
  .conf.high{color:var(--green);border-color:rgba(34,197,94,.4)}
  .conf.mid{color:var(--amber);border-color:rgba(245,158,11,.4)}
  .conf.low{color:var(--faint)}
  .blockers{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.25);color:#f6c768;border-radius:10px;padding:9px 11px;font-size:12.5px;margin:10px 0}
  .nextstep{background:var(--card2);border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-top:10px}
  .nextstep b{color:var(--cyan)}
  .strategy-note{max-height:210px;overflow:auto;margin-top:12px;border:1px solid var(--line);border-radius:10px;background:var(--card2);padding:12px}
  .strategy-note b{color:var(--amber)}
  .strategy-note p{margin:6px 0 0;font-size:13px}
  .chip{display:inline-block;border:1px solid var(--line);border-radius:20px;padding:4px 10px;color:var(--muted);font-size:11.5px;margin:4px 5px 0 0;background:var(--card2)}
  .stat-line{display:flex;flex-wrap:wrap;gap:6px 14px;margin-top:12px;color:var(--faint);font-size:12px}
  .stat-line b{color:var(--text)}
  /* candidate cards */
  .cards{display:flex;flex-direction:column;gap:14px}
  .candidate{background:linear-gradient(180deg,#1f252d,#1a1f26);border:1px solid var(--line);border-radius:14px;padding:16px;position:relative;overflow:hidden}
  .candidate.top{border-color:rgba(34,197,94,.45)}
  .candidate.top::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(var(--green),var(--cyan))}
  .head{display:flex;gap:13px;align-items:flex-start}
  .avatar{position:relative;width:52px;height:52px;border-radius:12px;flex:none;overflow:hidden;
    background:linear-gradient(135deg,var(--cyan),#4f46e5);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:20px;color:#fff}
  .avatar img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .rank-badge{position:absolute;-webkit-text-fill-color:initial;top:-6px;left:-6px}
  .role{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--green)}
  .role.alt{color:var(--muted)}
  .name{font-size:16.5px;font-weight:800;line-height:1.2;margin-top:1px}
  .name .full{color:var(--muted);font-weight:500;font-size:13px}
  .meta{color:var(--faint);font-size:12.5px;margin-top:3px}
  .meta b{color:var(--text);font-weight:600}
  .er-strong{color:var(--green)} .er-normal{color:var(--blue)} .er-weak{color:var(--amber)}
  a{color:var(--blue);text-decoration:none}
  a:hover{text-decoration:underline}
  .muted{color:var(--muted)}
  .scorebox{margin-left:auto;text-align:right;flex:none}
  .score{font-size:30px;font-weight:850;line-height:1}
  .score.s-high{color:var(--green)} .score.s-mid{color:var(--amber)} .score.s-low{color:var(--faint)}
  .score-band{font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--faint);margin-top:3px}
  .decision-line{font-size:14.5px;font-weight:700;margin:12px 0 0}
  .why{margin:9px 0 0;padding-left:18px}
  .why li{margin:3px 0;color:#c8d2dd}
  .bars{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:9px;margin:13px 0 0}
  @media(max-width:720px){.bars{grid-template-columns:repeat(2,minmax(0,1fr))}}
  .bar span{display:block;color:var(--muted);font-size:11px;margin-bottom:5px}
  .bar span b{color:var(--text);font-weight:700}
  .meter{height:7px;background:#2b323b;border-radius:20px;overflow:hidden}
  .meter i{display:block;height:100%;border-radius:20px}
  .m-high{background:linear-gradient(90deg,var(--cyan),var(--green))}
  .m-mid{background:linear-gradient(90deg,#caa23a,var(--amber))}
  .m-low{background:linear-gradient(90deg,#b4474b,var(--red))}
  details.more{margin-top:11px;border-top:1px solid var(--line);padding-top:9px}
  details.more>summary{cursor:pointer;color:var(--muted);font-size:12px;list-style:none;user-select:none}
  details.more>summary::-webkit-details-marker{display:none}
  details.more>summary::before{content:"‚Ėł ";color:var(--cyan)}
  details.more[open]>summary::before{content:"‚Ėĺ "}
  .note{margin-top:10px;font-size:12.5px;color:var(--muted)}
  .note b{color:var(--text)}
  .ai-note{border-left:2px solid var(--cyan);padding-left:9px}
  .warn-note{border-left:2px solid var(--amber);padding-left:9px;color:#f6c768}
  .evidence{border-top:1px solid var(--line);margin-top:12px;padding-top:10px}
  .ev{padding:8px 0;border-bottom:1px solid #262d36}
  .ev:last-child{border-bottom:0}
  .tag{display:inline-block;color:#0b0d10;background:var(--amber);font-size:10.5px;font-weight:800;border-radius:6px;padding:1px 7px;margin-right:7px;text-transform:uppercase;letter-spacing:.03em}
  .tag.reel{background:var(--cyan)} .tag.comment{background:#a78bfa}
  .ev-text{color:#c8d2dd;margin-top:3px}
  .filtered-row{display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center;border:1px solid var(--line);border-radius:11px;background:var(--card2);padding:10px 12px;margin:8px 0}
  .mini-ava{width:34px;height:34px;border-radius:9px;overflow:hidden;position:relative;background:linear-gradient(135deg,#3a4350,#222831);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#cdd6e0;flex:none}
  .mini-ava img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  table{width:100%;border-collapse:collapse}
  th,td{text-align:left;border-bottom:1px solid var(--line);padding:8px 6px;vertical-align:top}
  th{color:var(--faint);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
  .ok{color:var(--green)} .warn{color:var(--amber)} .bad{color:var(--red)}
  .empty{padding:18px;color:var(--muted);border:1px dashed var(--line);border-radius:12px;text-align:center}
  /* progress */
  .progress{padding:22px;border:1px solid var(--line);border-radius:12px;background:var(--card2)}
  .progress .pbar{height:6px;background:#2b323b;border-radius:20px;overflow:hidden;margin:14px 0 12px}
  .progress .pbar i{display:block;height:100%;width:30%;border-radius:20px;background:linear-gradient(90deg,var(--cyan),var(--green));
    animation:slide 1.4s ease-in-out infinite}
  @keyframes slide{0%{margin-left:-30%}100%{margin-left:100%}}
  .pstage{font-weight:700}
  .pelapsed{color:var(--faint);font-size:12px;margin-top:4px}
  .psteps{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
  .pstep{font-size:11.5px;color:var(--faint);border:1px solid var(--line);border-radius:20px;padding:3px 9px}
  .pstep.done{color:var(--green);border-color:rgba(34,197,94,.35)}
  .pstep.active{color:var(--cyan);border-color:var(--cyan)}
  .spin{display:inline-block;width:14px;height:14px;border:2px solid var(--line);border-top-color:var(--red);border-radius:50%;animation:s .8s linear infinite;vertical-align:-2px;margin-right:6px}
  @keyframes s{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<header>
  <div class="brand"><span class="dot"></span><h1>Influencer Se√ßim Motoru</h1></div>
  <div class="sub">kampaniya √ľ√ß√ľn kimi kontakta √ßńĪxaraq?</div>
  <div class="status" id="eng"><span class="live"></span><span id="engtxt">...</span></div>
</header>
<main>
  <div class="grid">
    <section class="panel">
      <label for="q">Kampaniya tapŇüńĪrńĪńüńĪ</label>
      <textarea id="q">Xalq Sigorta √ľ√ß√ľn s…ôyah…ôt sńĪńüortasńĪ bar…ôd…ô emosional selling proposition y√∂n√ľml√ľ Instagram Reel ssenarisini canlandńĪracaq Az…ôrbaycanlńĪ travel/lifestyle influencer lazńĪmdńĪr.</textarea>
      <div class="row">
        <div><label for="seed">∆Źlav…ô yoxlanacaq profill…ôr</label><input id="seed" placeholder="@profil1, @profil2"/></div>
        <div class="small"><label for="top">Namiz…ôd sayńĪ</label><input id="top" type="number" min="1" max="10" value="3"/></div>
        <div class="small"><label for="minscore">Minimum bal</label><input id="minscore" type="number" min="0" max="10" step="0.5" value="0"/></div>
        <div class="small"><label for="minfollowers">Minimum izl…ôyici</label><input id="minfollowers" type="number" min="0" step="1000" value="20000"/></div>
      </div>
      <div class="row">
        <label class="check"><input id="comments" type="checkbox" checked/> r…ôy analizi</label>
        <label class="check"><input id="verdict" type="checkbox" checked/> AI q…ôrar qeydi</label>
        <label class="check"><input id="unknownfollowers" type="checkbox"/> izl…ôyicisi bilinm…ôy…ônl…ôri burax</label>
        <button class="primary" id="go">Namiz…ôd tap</button>
      </div>
      <div id="brief" class="brief"></div>
    </section>
    <section class="panel">
      <div id="summary" class="empty">TapŇüńĪrńĪńüńĪ yazńĪn: sistem bu kampaniya √ľ√ß√ľn kim…ô ilk yazmańüńĪn daha dońüru olduńüunu q…ôrar dili il…ô g√∂st…ôr…ôc…ôk.</div>
    </section>
  </div>
  <section id="out" style="margin-top:18px"></section>
</main>
<script>
const $ = s => document.querySelector(s);
const esc = s => String(s ?? '').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const pct = n => Math.max(0, Math.min(100, Number(n||0)*10));
const fmt = n => n==null ? '-' : Number(n).toLocaleString('az');
const er = n => n ? (Number(n)*100).toFixed(2)+'%' : '-';
const cleanVerdict = s => esc(String(s || '').replace(/\*\*/g,'').replace(/\n{3,}/g,'\n\n')).replace(/\n/g,'<br>');
const band = n => n>=7 ? 'high' : n>=5 ? 'mid' : 'low';
const confClass = c => /y√ľks…ôk/i.test(c)?'high':/orta/i.test(c)?'mid':'low';
const erClass = b => b==='g√ľcl√ľ'?'er-strong':b==='normal'?'er-normal':b==='z…ôif'?'er-weak':'';

function avatarHTML(c, cls){
  const letter = esc((c.handle||'?').slice(0,1).toUpperCase());
  const img = c.avatar ? `<img src="${esc(c.avatar)}" alt="" loading="lazy" referrerpolicy="no-referrer" onerror="this.remove()"/>` : '';
  return `<div class="${cls}">${letter}${img}</div>`;
}

async function health(){
  try{
    const h = await (await fetch('/api/health')).json();
    $('#engtxt').textContent = 'AI: '+h.llm+' ¬∑ Instagram: '+(h.apify?'aktiv':'s√∂n√ľl√ľ');
    $('#eng').classList.toggle('on', !!h.apify);
  }catch(e){ $('#engtxt').textContent = 'backend iŇül…ômir'; }
}

function seedHandles(){
  return $('#seed').value.split(',').map(x=>x.trim().replace(/^@/,'')).filter(Boolean);
}

function renderBrief(b){
  const fields = [
    ['Brend', b.brand], ['M…ôhsul', b.product], ['Emosional bucaq', b.selling_angle],
    ['Auditoriya', b.audience], ['Format', b.content_format],
    ['M√∂vzular', (b.must_have_topics||[]).join(', ')],
    ['Namiz…ôd tipi', (b.creator_archetypes||[]).join(', ')],
    ['AxtarńĪŇü hashtag-l…ôri', (b.hashtags||[]).map(x=>'#'+x).join(' ')]
  ];
  $('#brief').innerHTML = fields.map(([k,v])=>`<div class="kv"><b>${esc(k)}</b>${esc(v||'-')}</div>`).join('');
}

function meter(v){
  const b = band(Number(v||0));
  const cls = b==='high'?'m-high':b==='mid'?'m-mid':'m-low';
  return `<div class="meter"><i class="${cls}" style="width:${pct(v)}%"></i></div>`;
}
function barItem(k,v){
  return `<div class="bar"><span>${esc(k)} <b>${Number(v||0).toFixed(1)}</b></span>${meter(v)}</div>`;
}
function bars(c){
  const s = c.scores || {};
  const key = [['Auditoriya', s.audience_fit],['Kontent', s.content_fit],['QarŇüńĪlńĪqlńĪ …ôlaq…ô', s.engagement_quality],['T…ôhl√ľk…ôsizlik', s.brand_safety]];
  const more = [['AI uyńüunluq', s.ai_fit],['Lokal bazar', s.market_fit],['R…ôy', s.feedback_sentiment],['EtibarlńĪlńĪq', s.authenticity],['S√ľbut', s.proof_density],['T…ôsir g√ľc√ľ', s.influence_power]];
  return `<div class="bars">${key.map(([k,v])=>barItem(k,v)).join('')}</div>
    <details class="more"><summary>B√ľt√ľn g√∂st…ôricil…ôr</summary>
      <div class="bars">${more.map(([k,v])=>barItem(k,v)).join('')}</div>
    </details>`;
}

function renderDecision(d){
  const dec = d.decision || {};
  const ranked = dec.what_was_ranked || [];
  const blockers = dec.blockers || [];
  return `<div class="decision-box">
    <h2>Bu n…ôtic…ô n…ô √ľ√ß√ľnd√ľr?</h2>
    <p class="muted">${esc(dec.purpose || 'Bu brief √ľ√ß√ľn uyńüun creator se√ßimi.')}</p>
    <p class="qline">${esc(dec.campaign_question || '')}</p>
    <p class="muted">Aktiv se√ßim filteri: <b>${esc(dec.active_gate || '-')}</b></p>
    <p class="answer">${esc(dec.answer || '')}</p>
    <p><span class="conf ${confClass(dec.confidence||'')}">∆Źminlik: <b>${esc(dec.confidence || '-')}</b></span> <span class="muted">${esc(dec.confidence_reason || '')}</span></p>
    ${blockers.length?`<div class="blockers">‚ö† ${esc(blockers.join(' ¬∑ '))}</div>`:''}
    <div class="nextstep"><b>N√∂vb…ôti addńĪm:</b> ${esc(dec.recommended_next_step || '')}</div>
    <div style="margin-top:10px">${ranked.map(x=>`<span class="chip">${esc(x)}</span>`).join('')}</div>
  </div>`;
}

function evidence(c){
  const ev = (c.evidence||[]).slice().sort((a,b)=>(b.relevance||0)-(a.relevance||0)).slice(0,6);
  if(!ev.length) return '<div class="muted" style="margin-top:10px">S√ľbut tapńĪlmadńĪ.</div>';
  return `<div class="evidence">${ev.map(e=>{
    const m = e.metrics || {};
    const meta = `b…ôy…ônm…ô ${fmt(m.likes||0)} ¬∑ r…ôy ${fmt(m.comments||0)} ¬∑ baxńĪŇü ${fmt(m.video_views||0)} ¬∑ uyńüunluq ${Number(e.relevance||0).toFixed(1)}`;
    const kind = e.kind === 'comment' ? 'r…ôy' : e.kind === 'post' ? 'paylaŇüńĪm' : 'reel';
    const tagCls = e.kind === 'comment' ? 'comment' : e.kind === 'reel' ? 'reel' : '';
    return `<div class="ev"><span class="tag ${tagCls}">${esc(kind)}</span>${e.url?`<a href="${esc(e.url)}" target="_blank" rel="noopener">${esc(meta)}</a>`:`<span class="muted">${esc(meta)}</span>`}
      <div class="ev-text">${esc((e.text||'').slice(0,260))}</div></div>`;
  }).join('')}</div>`;
}

function candidate(c,i){
  const score = c.scores ? c.scores.total : 0;
  const dec = c.decision || {};
  const why = dec.why || [];
  const checks = dec.next_checks || [];
  const marketReasons = c.market_reasons || [];
  const aiReasons = c.ai_reasons || [];
  const sb = band(Number(score||0));
  const eb = c.engagement_band || 'nam…ôlum';
  const isTop = i < 3;
  return `<article class="candidate ${isTop?'top':''}">
    <div class="head">
      ${avatarHTML(c,'avatar')}
      <div style="flex:1;min-width:0">
        <div class="role ${isTop?'':'alt'}">${esc(dec.role || (i===0?'ńįlk …ôlaq…ô':'Namiz…ôd'))}</div>
        <div class="name"><a href="${esc(c.url)}" target="_blank" rel="noopener">@${esc(c.handle)}</a> <span class="full">${esc(c.name||'')}</span></div>
        <div class="meta">izl…ôyici <b>${fmt(c.followers)}</b> ¬∑ qarŇüńĪlńĪqlńĪ …ôlaq…ô <b class="${erClass(eb)}">${er(c.engagement_rate)}${eb!=='nam…ôlum'?' ('+esc(eb)+')':''}</b> ¬∑ paylaŇüńĪm <b>${fmt(c.posts_count)}</b></div>
      </div>
      <div class="scorebox">
        <div class="score s-${sb==='high'?'high':sb==='mid'?'mid':'low'}">${Number(score||0).toFixed(1)}</div>
        <div class="score-band">${esc(dec.score_band || '')}</div>
      </div>
    </div>
    <p class="decision-line">${esc(dec.decision || c.proof_summary || '')}</p>
    ${why.length?`<ul class="why">${why.map(x=>`<li>${esc(x)}</li>`).join('')}</ul>`:''}
    ${bars(c)}
    ${aiReasons.length?`<div class="note ai-note"><b>AI m√ľhakim…ôsi:</b> ${esc(aiReasons.slice(0,3).join(' ¬∑ '))}</div>`:''}
    ${marketReasons.length?`<div class="note"><b>Lokal siqnal:</b> ${esc(marketReasons.slice(0,3).join(' ¬∑ '))}</div>`:''}
    ${(c.flags&&c.flags.length)?`<div class="note warn-note">${esc(c.flags.join('; '))}</div>`:''}

function startProgress(){
