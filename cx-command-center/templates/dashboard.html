<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Customer Relations Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script>
  tailwind.config = { theme: { extend: {
    colors: {
      brand: { red:'#E31E24', redDark:'#B3171C', ink:'#1C1B17', charcoal:'#2B2A29' },
      surface: { bg:'#F5F6F8', card:'#FFFFFF', line:'#E5E7EB' },
    },
    fontFamily: { sans:['Inter','system-ui','sans-serif'] },
  }}};
</script>
<style>
  body { background:#F5F6F8; }
  .num { font-variant-numeric: tabular-nums; }
  .card { background:#fff; border:1px solid #E7E9EE; border-radius:8px; box-shadow:0 1px 2px rgba(16,24,40,.04); }
  .btn { border-radius:8px; transition:background .15s ease, border-color .15s ease, color .15s ease; }
  .chip { border-radius:999px; }
  .seg { transition:all .15s ease; }
  .fade { animation:fade .22s ease both; }
  @keyframes fade { from{opacity:0; transform:translateY(4px)} to{opacity:1; transform:none} }
  .skeleton { background:linear-gradient(90deg,#eef0f3 25%,#e3e6ea 37%,#eef0f3 63%); background-size:400% 100%; animation:sh 1.3s ease infinite; }
  @keyframes sh { 0%{background-position:100% 0} 100%{background-position:-100% 0} }
  .thin-scroll::-webkit-scrollbar { width:8px; height:8px; }
  .thin-scroll::-webkit-scrollbar-thumb { background:#C9CED6; border-radius:8px; }
</style>
</head>
<body class="font-sans text-brand-ink">
<header class="bg-brand-ink text-white">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 py-3 flex items-center gap-3">
    <div class="w-9 h-9 bg-brand-red rounded-lg flex items-center justify-center font-extrabold">CR</div>
    <div class="min-w-0">
      <div id="brand-name" class="font-extrabold leading-tight truncate">Customer Relations Center</div>
      <div id="brand-tagline" class="text-white/55 text-xs truncate">Complaint radar</div>
    </div>
    <span id="mode-badge" class="chip text-[10px] font-bold uppercase bg-white/10 text-white/75 px-2 py-1">demo</span>
    <div class="ml-auto flex items-center gap-2">
      <button id="refresh" class="btn bg-white/10 hover:bg-white/15 px-3 py-2 text-sm flex items-center gap-2" title="Yenilə">
        <i data-lucide="refresh-cw" class="w-4 h-4"></i><span class="hidden sm:inline">Yenilə</span>
      </button>
      <button id="sync-all" class="btn bg-white/10 hover:bg-white/15 px-3 py-2 text-sm flex items-center gap-2" title="Sync live channels">
        <i data-lucide="radio" class="w-4 h-4"></i><span class="hidden sm:inline">Sync</span>
      </button>
      <a href="/api/export.csv?days=30" class="btn bg-white/10 hover:bg-white/15 px-3 py-2 text-sm flex items-center gap-2" title="CSV export">
        <i data-lucide="download" class="w-4 h-4"></i><span class="hidden sm:inline">CSV</span>
      </a>
      <a href="/api/docs" target="_blank" class="btn bg-brand-red hover:bg-brand-redDark px-3 py-2 text-sm flex items-center gap-2" title="API sənədləri">
        <i data-lucide="plug" class="w-4 h-4"></i><span class="hidden sm:inline">API</span>
      </a>
    </div>
  </div>
</header>

<main class="max-w-7xl mx-auto px-4 sm:px-6 py-5">
  <section class="mb-4">
    <div class="grid grid-cols-2 lg:grid-cols-6 gap-3" id="kpis">
      <div class="card p-4 skeleton h-24"></div>
      <div class="card p-4 skeleton h-24"></div>
      <div class="card p-4 skeleton h-24"></div>
      <div class="card p-4 skeleton h-24"></div>
      <div class="card p-4 skeleton h-24"></div>
      <div class="card p-4 skeleton h-24"></div>
    </div>
  </section>

  <section class="grid grid-cols-1 lg:grid-cols-3 gap-4 mb-4">
    <div class="card p-4 lg:col-span-2">
      <div class="flex items-start gap-3">
        <span id="brief-dot" class="w-3 h-3 rounded-full bg-gray-300 mt-1.5"></span>
        <div>
          <h1 id="brief-title" class="text-xl font-extrabold leading-tight">Yüklənir...</h1>
          <p id="brief-text" class="text-sm text-gray-600 mt-1 leading-relaxed">Sistem son siqnalları analiz edir.</p>
        </div>
      </div>
    </div>
    <div class="card p-4">
      <div class="flex items-center justify-between mb-3">
        <h2 class="font-bold">Risk indeksi</h2>
        <span id="risk-score" class="num text-2xl font-extrabold">0</span>
      </div>
      <div class="h-2.5 bg-gray-100 rounded-full overflow-hidden">
        <div id="risk-bar" class="h-full bg-brand-red rounded-full" style="width:0%"></div>
      </div>
      <div class="flex justify-between text-[11px] text-gray-400 mt-2">
        <span>Normal</span><span>Yüksək</span><span>Kritik</span>
      </div>
    </div>
  </section>

  <section class="grid grid-cols-1 md:grid-cols-3 gap-3 mb-4" id="integration-health"></section>

  <section class="card p-3 mb-4">
    <div class="grid grid-cols-1 md:grid-cols-5 gap-2">
      <div class="relative md:col-span-2">
        <i data-lucide="search" class="w-4 h-4 absolute left-3 top-3 text-gray-400"></i>
        <input id="q" class="w-full border border-surface-line rounded-lg pl-9 pr-3 py-2 text-sm outline-none focus:border-brand-red" placeholder="Axtarış" />
      </div>
      <select id="status" class="border border-surface-line rounded-lg px-3 py-2 text-sm outline-none focus:border-brand-red">
        <option value="all">Bütün statuslar</option>
      </select>
      <select id="severity" class="border border-surface-line rounded-lg px-3 py-2 text-sm outline-none focus:border-brand-red">
        <option value="all">Bütün risklər</option>
        <option value="critical">Critical</option>
        <option value="high">High</option>
        <option value="medium">Medium</option>
        <option value="low">Low</option>
      </select>
      <select id="channel" class="border border-surface-line rounded-lg px-3 py-2 text-sm outline-none focus:border-brand-red">
        <option value="all">Bütün kanallar</option>
      </select>
    </div>
  </section>

  <section class="grid grid-cols-1 xl:grid-cols-3 gap-4">
    <div class="xl:col-span-2 space-y-4">
      <div class="card p-4">
        <div class="flex items-center justify-between mb-3">
          <h2 class="font-extrabold">Prioritet sıra</h2>
          <span id="queue-count" class="text-xs text-gray-500 num">0</span>
        </div>
        <div id="complaints" class="space-y-2 max-h-[620px] overflow-y-auto thin-scroll pr-1"></div>
      </div>
    </div>

    <aside class="space-y-4">
      <div class="card p-4">
        <h2 class="font-extrabold mb-3">SLA gecikmələri</h2>
        <div id="overdue" class="space-y-2"></div>
      </div>

      <div class="card p-4">
        <h2 class="font-extrabold mb-3">Root-cause</h2>
        <div id="root-causes" class="space-y-3"></div>
      </div>

      <div class="card p-4">
        <h2 class="font-extrabold mb-3">Kanallar</h2>
        <div class="h-48"><canvas id="channel-chart"></canvas></div>
      </div>

      <div class="card p-4">
        <h2 class="font-extrabold mb-3">AI command</h2>
        <form id="ask-form" class="flex gap-2">
          <input id="ask" class="flex-1 border border-surface-line rounded-lg px-3 py-2 text-sm outline-none focus:border-brand-red" placeholder="Məsələn: əsas səbəblər nədir?" />
          <button class="btn bg-brand-ink text-white px-3 py-2" title="Soruş">
            <i data-lucide="send" class="w-4 h-4"></i>
          </button>
        </form>
        <div id="answer" class="text-sm text-gray-600 mt-3 leading-relaxed"></div>
      </div>
    </aside>
  </section>
</main>

<div id="toast" class="fixed right-4 bottom-4 hidden bg-brand-ink text-white rounded-lg px-4 py-3 text-sm shadow-lg"></div>
<script src="/static/app.js"></script>
</body>
</html>
