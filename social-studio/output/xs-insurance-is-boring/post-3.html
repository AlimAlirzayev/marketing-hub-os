<!doctype html><html><head><meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter+Tight:wght@800&family=Inter:wght@400;500&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }
body { width:1080px; height:1350px; background:#1C1B17; position:relative;
       font-family:'Inter Tight','Manrope','Segoe UI',sans-serif; overflow:hidden; }
.content { position:absolute; top:0; left:0; right:0; bottom:190px;
           display:flex; flex-direction:column; justify-content:center; padding:0 96px; }
.divider { width:72px; height:6px; background:#E31E24; margin-bottom:48px; }
h1 { color:#FFFFFF; font-weight:800; font-size:88px; line-height:1.08;
     letter-spacing:-0.5px; max-width:860px; }
.body-line { font-family:'Inter','Segoe UI',sans-serif; font-weight:400;
     color:rgba(255,255,255,.72); font-size:34px; line-height:1.5;
     margin-top:44px; max-width:740px; }
.footer { position:absolute; left:0; bottom:0; width:1080px; height:190px; }
.footer-shade { position:absolute; left:0; bottom:0; width:1080px; height:280px;
     background:linear-gradient(180deg, rgba(28,27,23,0) 0%, rgba(0,0,0,.35) 100%); }
</style></head><body>
<div class="content">
  <div class="divider"></div>
  <h1>Ən yaxşı halda bizi heç vaxt görməyəcəksiniz.</h1>
  <p class="body-line">Görüşməyimiz üçün pis bir gün lazımdır. Biz o günə hazırıq.</p>
</div>
<div class="footer-shade"></div>
<img class="footer" src="../../brand_kit/xalqsigorta-footer-dark.svg">
</body></html>
